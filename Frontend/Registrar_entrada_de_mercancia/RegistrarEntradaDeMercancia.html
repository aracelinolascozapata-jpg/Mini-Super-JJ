<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title> Registrar Entrada de Mercancía</title>

<style>
body{ font-family:Arial; background:#f4f4f4; margin:0; }
header{ background:#2c3e50; color:white; padding:15px; text-align:center; }
.container{ padding:20px; }
button{ padding:8px 12px; margin:5px; cursor:pointer; }
input, select{ padding:8px; margin:5px; }
table{ width:100%; border-collapse:collapse; margin-top:15px; }
table, th, td{ border:1px solid #ccc; padding:10px; text-align:center; }
.hidden{ display:none; }
.comprobante{ background:white; border:1px solid #ccc; padding:15px; margin-top:20px; }
</style>
</head>
<body>

<header>
<h2>Registrar Entrada de Mercancía</h2>
</header>

<div class="container">
<div id="menu">
    <h3>Entradas de Mercancía</h3>
    <button onclick="nuevaEntrada()">Nueva Entrada</button>
</div>

<div id="entrada" class="hidden">
    <h3>Registrar Entrada de Mercancía</h3>
    
    <label>Proveedor</label>
    <select id="proveedor">
        <option value="">Seleccione proveedor</option>
    </select>
    
    <label>Factura / Remisión</label>
    <input type="text" id="factura">
    <br><br>

    <!-- EL DATALIST PARA AUTOCOMPLETAR -->
    <label>Producto</label>
    <input type="text" id="producto" list="listaProductos" placeholder="Escribe o selecciona...">
    <datalist id="listaProductos"></datalist>

    <label>Precio Compra</label>
    <input type="number" id="precio_compra" step="0.01">

    <label>Precio Venta</label>
    <input type="number" id="precio_venta" step="0.01">

    <label>Cantidad</label>
    <input type="number" id="cantidad">
    
    <br>
    <button onclick="agregarProducto()">Agregar Producto</button>
    <button onclick="eliminarLinea()">Eliminar Línea</button>

    <table id="tabla">
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>P. Compra</th>
            <th>P. Venta</th>
            <th>Subtotal</th>
        </tr>
    </table>
    
    <h3>Total Entrada: $<span id="total">0</span></h3>
    <button onclick="finalizarEntrada()">Finalizar Entrada</button>
    <button onclick="cancelar()">Cancelar</button>
</div>

<div id="resumen" class="hidden">
    <h3>Resumen de Entrada</h3>
    <div id="detalle"></div>
    <h3>¿Registrar como pago realizado o pendiente?</h3>
    <button onclick="guardarEntrada('Pagado')">Pago Realizado</button>
    <button onclick="guardarEntrada('Pendiente')">Pago Pendiente</button>
</div>

<div id="comprobante" class="hidden comprobante"></div>
</div>

<script>
let entrada = [];
let total = 0;

// CARGAMOS PROVEEDORES Y PRODUCTOS (Autocompletado)
function cargarDatosIniciales() {
    fetch('MercanciaServlet')
        .then(response => response.json())
        .then(data => {
        	console.log("Datos recibidos:", data);
            let selProv = document.getElementById("proveedor");
            selProv.innerHTML = '<option value="">Seleccione proveedor</option>';
            data.proveedores.forEach(p => {
                selProv.add(new Option(p, p));
            });

            let listProd = document.getElementById("listaProductos");
            data.productos.forEach(p => {
                let opt = document.createElement("option");
                opt.value = p;
                listProd.appendChild(opt);
            });
        })
        .catch(error => console.error('Error cargando datos:', error));
}
window.onload = cargarDatosIniciales;

function nuevaEntrada() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("entrada").classList.remove("hidden");
}

function agregarProducto() {
    let producto = document.getElementById("producto").value;
    let pCompra = parseFloat(document.getElementById("precio_compra").value);
    let pVenta = parseFloat(document.getElementById("precio_venta").value);
    let cantidad = parseInt(document.getElementById("cantidad").value);

    if (!producto || isNaN(pCompra) || isNaN(pVenta) || isNaN(cantidad)) {
        alert("Completa todos los datos del producto (incluyendo precio de venta).");
        return;
    }

    let subtotal = pCompra * cantidad;
    entrada.push({ producto, cantidad, pCompra, pVenta, subtotal });

    let tabla = document.getElementById("tabla");
    let fila = tabla.insertRow();
    fila.insertCell(0).innerHTML = producto;
    fila.insertCell(1).innerHTML = cantidad;
    fila.insertCell(2).innerHTML = "$" + pCompra;
    fila.insertCell(3).innerHTML = "$" + pVenta;
    fila.insertCell(4).innerHTML = "$" + subtotal;

    total += subtotal;
    document.getElementById("total").innerText = total;
    
    // Limpiar casillas para el siguiente producto
    document.getElementById("producto").value = "";
    document.getElementById("precio_compra").value = "";
    document.getElementById("precio_venta").value = "";
    document.getElementById("cantidad").value = "";
}

function finalizarEntrada() {
    let proveedor = document.getElementById("proveedor").value;
    if (proveedor === "" || entrada.length === 0) {
        alert("Selecciona un proveedor y agrega productos.");
        return;
    }
    document.getElementById("entrada").classList.add("hidden");
    document.getElementById("resumen").classList.remove("hidden");

    let texto = "<b>Proveedor:</b> " + proveedor + "<br><br>";
    entrada.forEach(p => {
        texto += "• " + p.producto + " (" + p.cantidad + " pz) - Compra: $" + p.pCompra + " | Venta: $" + pVenta + "<br>";
    });
    texto += "<br><b>TOTAL A PAGAR: $" + total + "</b>";
    document.getElementById("detalle").innerHTML = texto;
}

function guardarEntrada(estadoPago) {
    let proveedor = document.getElementById("proveedor").value;
    let montoPagado = (estadoPago === 'Pagado') ? total : 0;
    document.getElementById("detalle").innerHTML = "<h3>Guardando en base de datos...</h3>";
    
    let promesas = entrada.map(p => {
        return fetch('MercanciaServlet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `producto=${encodeURIComponent(p.producto)}&cantidad=${p.cantidad}&pCompra=${p.pCompra}&pVenta=${p.pVenta}&proveedor=${encodeURIComponent(proveedor)}&pago=${montoPagado}&total=${total}`
        }).then(res => res.text());
    });

    Promise.all(promesas)
        .then(respuestas => {
            if (respuestas.every(r => r.trim() === "ok")) {
                document.getElementById("resumen").classList.add("hidden");
                let comp = document.getElementById("comprobante");
                comp.classList.remove("hidden");
                comp.innerHTML = `<h2 style="color:green">¡Registro Exitoso!</h2>
                                  <p>Nuevos productos creados y stocks actualizados.</p>
                                  <button onclick="location.reload()">Nueva Entrada</button>`;
            } else {
                alert("Error en el servidor: " + respuestas[0]);
            }
        })
        .catch(err => alert("Error de red."));
}

function cancelar() {
    if (confirm("¿Cancelar entrada?")) location.reload();
}
</script>
</body>
</html>
