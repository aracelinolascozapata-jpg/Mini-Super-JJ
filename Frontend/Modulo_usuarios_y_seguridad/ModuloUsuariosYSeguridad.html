<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestionar Seguridad y Control de Accesos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#eee;
}

button{
padding:6px 10px;
cursor:pointer;
}

.panel{
margin-top:20px;
background:white;
padding:20px;
display:none;
}

.mensaje{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Módulo Usuarios y Seguridad</h2>

<table>

<thead>
<tr>
<th>Usuario</th>
<th>Rol</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

<div class="panel" id="panelEdicion">

<h3>Modificar permisos del usuario</h3>

<p id="usuarioSeleccionado"></p>

<label>Nuevo Rol</label>
<select id="rol">
<option>Encargado</option>
<option>Propietario</option>
<option>Gerente</option>	
</select>

<br><br>

<label>Nueva contraseña</label>
<input type="password" id="password">

<br><br>

<label>
<input type="checkbox" id="revocar">
Revocar acceso
</label>

<br><br>

<button onclick="guardarCambios()">Confirmar Cambios</button>

<p id="mensaje" class="mensaje"></p>

</div>

<script>

/* Mostrar lista de usuarios */

let usuariosDB = [];

function cargarUsuariosDesdeDB() {
    fetch('SeguridadServlet')
        .then(response => response.json())
        .then(data => {
            usuariosDB = data;
            renderizarTabla();
        })
        .catch(error => console.error('Error al cargar usuarios:', error));
}

function renderizarTabla() {
    let tabla = document.getElementById("tablaUsuarios");
    tabla.innerHTML = "";

    usuariosDB.forEach((u, i) => {
        let fila = `<tr>
            <td>${u.usuario}</td>
            <td>${u.rol}</td>
            <td><button onclick="seleccionarUsuario(${i})">Editar</button></td>
        </tr>`;
        tabla.innerHTML += fila;
    });
}

// Llamamos a la función al cargar la página
window.onload = cargarUsuariosDesdeDB;

/* Actualiza también seleccionarUsuario para que use el nuevo arreglo */
function seleccionarUsuario(i) {
    indiceSeleccionado = i;
    let usuario = usuariosDB[i];
    document.getElementById("usuarioSeleccionado").innerText = "Usuario: " + usuario.usuario;
    document.getElementById("rol").value = usuario.rol;
    document.getElementById("panelEdicion").style.display = "block";
}


/* Guardar cambios */

function guardarCambios() {
    let mensaje = document.getElementById("mensaje");
    let usuarioActual = usuariosDB[indiceSeleccionado]; // Usamos el arreglo de la DB
    
    let nuevoRol = document.getElementById("rol").value;
    let nuevaPass = document.getElementById("password").value;
    // Si el checkbox está marcado, enviamos 'true'
    let revocar = document.getElementById("revocar").checked;

    // Convertimos el nombre del rol a ID (1=Dueño, 2=Encargado, 3=Gerente)
    let idRol;
    if (nuevoRol === "Propietario" || nuevoRol === "Dueño") {
        idRol = 1;
    } else if (nuevoRol === "Encargado" || nuevoRol === "Empleado") {
        idRol = 2;
    } else if (nuevoRol === "Gerente") {
        idRol = 3;
    }

    mensaje.innerText = "Guardando en Oracle...";

    fetch('SeguridadServlet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `idLogin=${usuarioActual.id}&idRol=${idRol}&password=${encodeURIComponent(nuevaPass)}&revocar=${revocar}`
    })
    .then(response => response.text())
    .then(res => {
        if (res === "ok") {
            mensaje.style.color = "green";
            mensaje.innerText = "¡Cambios guardados en la base de datos!";
            cargarUsuariosDesdeDB(); // Recargamos la tabla para ver los cambios
        } else {
            mensaje.style.color = "red";
            mensaje.innerText = "Error al actualizar en Oracle";
        }
    })
    .catch(error => {
        mensaje.style.color = "red";
        mensaje.innerText = "Error de red";
        console.error(error);
    });
}

</script>

</body>
</html>
