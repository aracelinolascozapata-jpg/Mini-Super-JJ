<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestionar Seguridad y Control de Accesos</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#eee;
}

button{
padding:6px 10px;
cursor:pointer;
}

.panel{
margin-top:20px;
background:white;
padding:20px;
display:none;
}

.mensaje{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Módulo Usuarios y Seguridad</h2>

<table>

<thead>
<tr>
<th>Usuario</th>
<th>Rol</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

<div class="panel" id="panelEdicion">

<h3>Modificar permisos del usuario</h3>

<p id="usuarioSeleccionado"></p>

<label>Nuevo Rol</label>
<select id="rol">
<option>Encargado</option>
<option>Propietario</option>
</select>

<br><br>

<label>Nueva contraseña</label>
<input type="password" id="password">

<br><br>

<label>
<input type="checkbox" id="revocar">
Revocar acceso
</label>

<br><br>

<button onclick="guardarCambios()">Confirmar Cambios</button>

<p id="mensaje" class="mensaje"></p>

</div>

<script>

/* Usuarios registrados */

let usuarios=[
{usuario:"encargado1",rol:"Encargado",password:"1111",activo:true},
{usuario:"encargado2",rol:"Encargado",password:"2222",activo:true}
];

let indiceSeleccionado=null;

/* Mostrar lista de usuarios */

function mostrarUsuarios(){

let tabla=document.getElementById("tablaUsuarios");
tabla.innerHTML="";

usuarios.forEach((u,i)=>{

let fila="<tr>";
fila+="<td>"+u.usuario+"</td>";
fila+="<td>"+u.rol+"</td>";
fila+="<td><button onclick='seleccionarUsuario("+i+")'>Editar</button></td>";
fila+="</tr>";

tabla.innerHTML+=fila;

});

}

mostrarUsuarios();

/* Seleccionar usuario */

function seleccionarUsuario(i){

indiceSeleccionado=i;

let usuario=usuarios[i];

document.getElementById("usuarioSeleccionado").innerText=
"Usuario: "+usuario.usuario;

document.getElementById("rol").value=usuario.rol;

document.getElementById("panelEdicion").style.display="block";

}

/* Guardar cambios */

function guardarCambios(){

let mensaje=document.getElementById("mensaje");

try{

let usuario=usuarios[indiceSeleccionado];

usuario.rol=document.getElementById("rol").value;

let nuevaPassword=document.getElementById("password").value;

if(nuevaPassword!=""){
usuario.password=nuevaPassword;
}

if(document.getElementById("revocar").checked){
usuario.activo=false;
}

mensaje.style.color="green";
mensaje.innerText="Cambios guardados correctamente.";

}catch{

/* 6.1 Error de guardado */

mensaje.style.color="red";
mensaje.innerText="No se pudieron guardar los cambios";

}

}

</script>

</body>
</html>
