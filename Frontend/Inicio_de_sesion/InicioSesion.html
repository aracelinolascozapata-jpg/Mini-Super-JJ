<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso al Sistema - Minisúper JJ</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<style>
/* Reset y bases formales */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif; /* Tipografía corporativa */
}

body {
    /* Fondo con degradado muy tenue usando el azul pastel de tu paleta */
    background: linear-gradient(135deg, #b1d8ff 0%, #ffffff 100%);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #4a403a; /* Marrón vintage oscuro para el texto */
}

/* Tarjeta de Login: Minimalista y elegante */
.login-container {
    background: #ffffff;
    padding: 50px 40px;
    border-radius: 16px; /* Bordes redondeados modernos */
    /* Sombra muy suave para efecto flotante profesional */
    box-shadow: 0 10px 30px rgba(74, 64, 58, 0.05);
    text-align: center;
    width: 360px;
    border: 1px solid rgba(232, 229, 226, 0.5); /* Borde sutil */
}

/* Identidad de marca formal */
.brand-section {
    margin-bottom: 35px;
}

.brand-section .icon-logo {
    font-size: 40px;
    color: #cbd0f1; /* Detalle Lila Pastel en el logo */
    margin-bottom: 10px;
}

.brand-section h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #4a403a;
    text-transform: uppercase;
}

.brand-section p {
    font-size: 14px;
    color: #8c8581;
    font-weight: 300;
    margin-top: 5px;
}

/* Grupos de entrada de datos estilizados */
.input-group {
    position: relative;
    margin-bottom: 20px;
    text-align: left;
}

.input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #615c58;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

/* Iconos de línea fina dentro del input */
.input-wrapper .material-icons-outlined {
    position: absolute;
    left: 14px;
    color: #babcde; /* Lila Pastel suave para iconos */
    font-size: 20px;
}

input {
    width: 100%;
    padding: 14px 14px 14px 45px; /* Espacio para el icono */
    border: 1px solid #e8e5e2; /* Borde beige ultra suave */
    border-radius: 8px;
    font-size: 14px;
    color: #4a403a;
    background-color: #fcfbfa; /* Fondo beige suave de la paleta */
    transition: all 0.3s ease;
    outline: none;
}

/* Efecto Focus formal usando el Rosa Pastel de acento */
input:focus {
    border-color: #f7cbd0; /* Borde Rosa Pastel */
    background-color: #ffffff;
    box-shadow: 0 0 0 3px rgba(247, 203, 208, 0.2); /* Resplandor suave */
}

/* Botón Principal Profesional (Verde Menta Pastel) */
button {
    width: 100%;
    padding: 15px;
    background-color: #d1ebd9; /* Verde Menta Soft */
    color: #3b5249; /* Texto oscuro para contraste formal */
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 10px;
    box-shadow: 0 4px 6px rgba(209, 235, 217, 0.3);
}

/* Hover formal usando el Amarillo Vainilla suave */
button:hover {
    background-color: #fbf0cb; /* Amarillo Vainilla Soft */
    color: #5e5333;
    transform: translateY(-1px);
    box-shadow: 0 6px 12px rgba(251, 240, 203, 0.4);
}

button:active {
    transform: translateY(1px);
}

/* Mensajes de error formales */
.mensaje {
    color: #e57373; /* Tono coral derivado del rosa para errores */
    font-size: 13px;
    font-weight: 400;
    margin-top: 20px;
    min-height: 18px;
}

/* Pie de página sutil */
.footer-text {
    margin-top: 30px;
    font-size: 12px;
    color: #b0aaa6;
    font-weight: 300;
}
</style>
</head>

<body>

<div class="login-container">

    <div class="brand-section">
        <span class="material-icons-outlined icon-logo">storefront</span>
        <h1>Minisúper JJ</h1>
        <p>Inicio de Sesiónl</p>
    </div>

    <div class="input-group">
        <label for="usuario">Correo o Usuario</label>
        <div class="input-wrapper">
            <span class="material-icons-outlined">alternate_email</span>
            <input type="text" id="usuario" placeholder="ejemplo@minisuper.com" autocomplete="username">
        </div>
    </div>

    <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
            <span class="material-icons-outlined">lock</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
    </div>

    <button onclick="iniciarSesion()">
        Ingresar al Sistema
    </button>

    <p id="mensaje" class="mensaje"></p>



</div>

<script>
// Tu lógica de JavaScript original permanece 100% INTACTA
function iniciarSesion() {
    let correo = document.getElementById("usuario").value; 
    let password = document.getElementById("password").value;
    let mensaje = document.getElementById("mensaje");
    
    mensaje.innerText = "Verificando credenciales...";
    mensaje.style.color = "#8c8581"; // Color neutro para carga

    fetch('LoginServlet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'correo=' + encodeURIComponent(correo) + '&password=' + encodeURIComponent(password)
    })
    .then(response => response.text())
    .then(resultado => {
    let id = resultado.trim();
    console.log("ID de Rol recibido:", id);

    if (id === "1" || id === "3") { 
        window.location.href = "menu_principal.html"; 
    } 
    else if (id === "2") { 
        window.location.href = "menu_empleado.html";
    } 
    else if (id === "error") {
        mensaje.style.color = "#e57373"; // Color error
        mensaje.innerText = "Correo o contraseña incorrectos.";
    } 
    else {
        mensaje.style.color = "#e57373";
        mensaje.innerText = "Error en la respuesta del servidor.";
    }
    })
    .catch(error => {
        mensaje.style.color = "#e57373";
        mensaje.innerText = "Error de red. Intente de nuevo.";
        console.error(error);
    });
}
</script>

</body>
</html>
