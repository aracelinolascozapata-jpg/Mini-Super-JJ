<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MiniSuper JJ</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:10px;
text-align:center;
}

.hidden{
display:none;
}

.ticket{
border:1px solid #ccc;
background:white;
padding:15px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h2>Sistema MiniSuper JJ</h2>
</header>

<div class="container">

<!-- MENU PRINCIPAL -->

<div id="menu">

<h3>Menú Principal</h3>

<button onclick="nuevaVenta()">Nueva Venta</button>

</div>

<!-- REGISTRAR VENTA -->

<div id="venta" class="hidden">

<h3>Registrar Venta</h3>

<label>Producto</label>
<input type="text" id="producto">

<label>Cantidad</label>
<input type="number" id="cantidad">

<button onclick="agregarProducto()">Agregar Producto</button>
<button onclick="eliminarProducto()">Eliminar Producto</button>

<table id="tabla">

<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio Unitario</th>
<th>Subtotal</th>
</tr>

</table>

<h4>Subtotal: $<span id="subtotal">0</span></h4>
<h4>Impuestos: $<span id="impuestos">0</span></h4>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="finalizarVenta()">Finalizar Venta</button>
<button onclick="cancelarVenta()">Cancelar</button>

</div>

<!-- RESUMEN -->

<div id="resumen" class="hidden">

<h3>Resumen de Venta</h3>

<div id="tablaResumen"></div>

<h3>Método de Pago</h3>

<button onclick="pagoEfectivo()">Efectivo</button>
<button onclick="pagoMercado()">Mercado Pago</button>

<button onclick="volverVenta()">Regresar</button>

</div>

<!-- EFECTIVO -->

<div id="efectivo" class="hidden">

<h3>Pago en Efectivo</h3>

<label>Monto recibido</label>
<input type="number" id="monto">

<button onclick="confirmarEfectivo()">Confirmar</button>

</div>

<!-- MERCADO PAGO -->

<div id="mercado" class="hidden">

<h3>Pago con Mercado Pago</h3>

<p>Simulación de código QR</p>

<button onclick="confirmarMercado()">Confirmar pago exitoso</button>
<button onclick="falloMercado()">Simular pago fallido</button>

</div>

<!-- TICKET -->

<div id="ticket" class="hidden ticket"></div>

</div>

<script>

let inventario={
"Coca":{precio:18,stock:10},
"Papas":{precio:20,stock:5},
"Pan":{precio:10,stock:8}
};

let venta=[];
let subtotal=0;
let impuestos=0;
let total=0;

function nuevaVenta(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("venta").classList.remove("hidden");
}

function agregarProducto(){

let nombre=document.getElementById("producto").value;
let cantidad=parseInt(document.getElementById("cantidad").value);

if(!inventario[nombre]){
alert("Producto no registrado en el inventario");
return;
}

if(cantidad>inventario[nombre].stock){
alert("Stock insuficiente. Máximo disponible: "+inventario[nombre].stock);
return;
}

let precio=inventario[nombre].precio;
let sub=precio*cantidad;

venta.push({nombre,cantidad,precio,sub});

let tabla=document.getElementById("tabla");
let fila=tabla.insertRow();

fila.insertCell(0).innerHTML=nombre;
fila.insertCell(1).innerHTML=cantidad;
fila.insertCell(2).innerHTML="$"+precio;
fila.insertCell(3).innerHTML="$"+sub;

subtotal+=sub;
impuestos=0;
total=subtotal+impuestos;

document.getElementById("subtotal").innerText=subtotal;
document.getElementById("impuestos").innerText=impuestos;
document.getElementById("total").innerText=total;

}

function eliminarProducto(){

let tabla=document.getElementById("tabla");

if(tabla.rows.length>1){

tabla.deleteRow(tabla.rows.length-1);
let p=venta.pop();

subtotal-=p.sub;
total=subtotal;

document.getElementById("subtotal").innerText=subtotal;
document.getElementById("total").innerText=total;

}

}

function finalizarVenta(){

if(venta.length==0){
alert("Debe agregar al menos un producto a la venta");
return;
}

document.getElementById("venta").classList.add("hidden");
document.getElementById("resumen").classList.remove("hidden");

let texto="";

venta.forEach(p=>{
texto+=p.nombre+" "+p.cantidad+" x $"+p.precio+" = $"+p.sub+"<br>";
});

document.getElementById("tablaResumen").innerHTML=texto+"<br>Total: $"+total;

}

function volverVenta(){
document.getElementById("resumen").classList.add("hidden");
document.getElementById("venta").classList.remove("hidden");
}

function pagoEfectivo(){
document.getElementById("resumen").classList.add("hidden");
document.getElementById("efectivo").classList.remove("hidden");
}

function confirmarEfectivo(){

let monto=parseFloat(document.getElementById("monto").value);

if(monto<total){
alert("Monto insuficiente. Faltan: "+(total-monto));
return;
}

let cambio=monto-total;

registrarVenta("Efectivo",cambio);

}

function pagoMercado(){
document.getElementById("resumen").classList.add("hidden");
document.getElementById("mercado").classList.remove("hidden");
}

function confirmarMercado(){
registrarVenta("Mercado Pago",0);
}

function falloMercado(){
alert("Pago con tarjeta fallido. Intente con otro método");
document.getElementById("mercado").classList.add("hidden");
document.getElementById("resumen").classList.remove("hidden");
}

function registrarVenta(metodo,cambio){

try{

venta.forEach(p=>{
inventario[p.nombre].stock-=p.cantidad;
});

let numero=Math.floor(Math.random()*100000);

let ticket="Numero de venta: "+numero+"<br><br>";

venta.forEach(p=>{
ticket+=p.nombre+" "+p.cantidad+" x $"+p.precio+" = $"+p.sub+"<br>";
});

ticket+="<br>Total: $"+total+"<br>";
ticket+="Metodo de pago: "+metodo+"<br>";

if(cambio>0){
ticket+="Cambio: $"+cambio+"<br>";
}

ticket+="<br><button onclick='imprimir()'>Imprimir Ticket</button>";
ticket+="<button onclick='correo()'>Enviar por correo</button>";
ticket+="<button onclick='menuPrincipal()'>Regresar al menú</button>";

document.getElementById("mercado").classList.add("hidden");
document.getElementById("efectivo").classList.add("hidden");

let div=document.getElementById("ticket");
div.innerHTML=ticket;
div.classList.remove("hidden");

}catch{

alert("Error al registrar la venta. Intente nuevamente");

}

}

function imprimir(){
alert("Ticket enviado a impresora");
}

function correo(){
alert("Ticket enviado por correo");
}

function menuPrincipal(){

location.reload();

}

function cancelarVenta(){

let confirmar=confirm("¿Seguro que desea cancelar la venta? Se perderán los datos.");

if(confirmar){
location.reload();
}

}

</script>

</body>
</html>
